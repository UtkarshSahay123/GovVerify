<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Government Sign Up - GovAuth</title>
    <link rel="stylesheet" href="../employee-login/employee-login.css">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon"></div>
                <span class="logo-text">GovAuth</span>
            </div>
            <nav class="nav">
                <a href="../HomePage/index.html" class="nav-link">Home</a>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <div class="login-container">
            <div class="login-form">
                <h1 class="login-title">Government Sign Up</h1>
                
                <form id="signupForm" class="form">
                    <div class="form-group">
                        <label for="fullName" class="form-label">Office Name</label>
                        <input type="text" id="fullName" name="fullName" class="form-input" placeholder="Enter department/office name" required>
                    </div>

                    <div class="form-group">
                        <label for="email" class="form-label">Official Email</label>
                        <input type="email" id="email" name="email" class="form-input" placeholder="Enter official email" required>
                    </div>

                    <div class="form-group">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" id="username" name="username" class="form-input" placeholder="Choose a username" required>
                    </div>

                    <div class="form-group">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" id="password" name="password" class="form-input" placeholder="Create a password" required>
                    </div>

                    <div class="form-group">
                        <label for="identifier" class="form-label">Gov Badge/ID Number</label>
                        <input type="text" id="identifier" name="identifier" class="form-input" placeholder="Enter ID number" required>
                    </div>

                    <button type="submit" class="login-button">Register Office</button>
                </form>

                <div class="signup-section">
                    <span class="signup-text">or</span>
                    <p class="signup-prompt">
                        Already have an account? 
                        <a href="government-login.html" class="signup-link">Login</a>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <script src="government-login.js"></script>
</body>
</html>
