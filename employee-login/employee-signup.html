<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Institution Registration - GovVerify</title>
    <link rel="stylesheet" href="/employee-login/employee-login.css">
    <link rel="stylesheet" href="/HomePage/toast.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .signup-form {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .signup-title {
            color: white;
            font-size: 2rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .login-section {
            margin-top: 2rem;
            text-align: center;
        }
        
        .login-text {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            display: block;
            margin-bottom: 1rem;
            position: relative;
        }
        
        .login-text::before,
        .login-text::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: rgba(255, 255, 255, 0.2);
        }
        
        .login-text::before {
            left: 0;
        }
        
        .login-text::after {
            right: 0;
        }
        
        .login-prompt {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
        }
        
        .login-link {
            color: #2ecc71;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }
        
        .login-link:hover {
            color: #27ae60;
            text-decoration: underline;
        }
        
        .signup-button {
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 0.5rem;
        }
        
        .signup-button:hover {
            background: #27ae60;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(46, 204, 113, 0.3);
        }
        
        .signup-button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="/" style="text-decoration: none; color: inherit;">
                <div class="logo">
                    <i class="fas fa-shield-alt" style="color: #3b82f6; font-size: 24px; margin-right: 8px;"></i>
                    <span class="logo-text">GovVerify</span>
                </div>
            </a>
        </div>
    </header>

    <main class="main-content">
        <div class="login-container">
            <div class="signup-form">
                <h1 class="signup-title">Employee Sign Up</h1>
                
                <form id="signupForm" class="form">
                    <div class="form-group">
                        <label for="fullName" class="form-label">Full Name</label>
                        <input 
                            type="text" 
                            id="fullName" 
                            name="fullName" 
                            class="form-input" 
                            placeholder="Enter your full name"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="email" class="form-label">Email</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            class="form-input" 
                            placeholder="Enter your email address"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="username" class="form-label">Username</label>
                        <input 
                            type="text" 
                            id="username" 
                            name="username" 
                            class="form-input" 
                            placeholder="Choose a username"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="password" class="form-label">Password</label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            class="form-input" 
                            placeholder="Create a password"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword" class="form-label">Confirm Password</label>
                        <input 
                            type="password" 
                            id="confirmPassword" 
                            name="confirmPassword" 
                            class="form-input" 
                            placeholder="Confirm your password"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="employeeId" class="form-label">Employee ID</label>
                        <input 
                            type="text" 
                            id="employeeId" 
                            name="employeeId" 
                            class="form-input" 
                            placeholder="Enter your employee ID"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="captcha" class="form-label">Captcha</label>
                        <div class="captcha-container">
                            <input 
                                type="text" 
                                id="captcha" 
                                name="captcha" 
                                class="form-input captcha-input" 
                                placeholder="Enter the code"
                                required
                            >
                            <div class="captcha-display" id="captchaDisplay"></div>
                            <button type="button" class="captcha-refresh" id="refreshCaptcha" title="Refresh Captcha">
                                ↻
                            </button>
                        </div>
                        <div class="captcha-error" id="captchaError"></div>
                    </div>

                    <button type="submit" class="signup-button">Sign Up</button>
                </form>

                <div class="login-section">
                    <span class="login-text">or</span>
                    <p class="login-prompt">
                        Already have an account? 
                        <a href="/employee-login/employee-login.html" class="login-link">Login</a>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <script src="/HomePage/toast.js"></script>
    <script src="/employee-login/employee-signup.js"></script>
</body>
</html>
