<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Login - GovVerify</title>
    <link rel="stylesheet" href="/employee-login/employee-login.css">
    <link rel="stylesheet" href="/HomePage/toast.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body>
    <header class="header">
        <div class="header-content">
            <a href="/" style="text-decoration: none; color: inherit;">
                <div class="logo">
                    <i class="fas fa-shield-alt" style="color: #3b82f6; font-size: 24px; margin-right: 8px;"></i>
                    <span class="logo-text">GovVerify</span>
                </div>
            </a>

        </div>
    </header>

    <main class="main-content">
        <div class="login-container">
            <div class="login-form">
                <h1 class="login-title">Employee Login</h1>

                <form id="loginForm" class="form">
                    <div class="form-group">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" id="username" name="username" class="form-input"
                            placeholder="Enter your username" required>
                    </div>

                    <div class="form-group">
                        <div class="password-header">
                            <label for="password" class="form-label">Password</label>
                            <button type="button" class="forgot-password" id="forgotPassword">
                                Forgot Password?
                            </button>
                        </div>
                        <input type="password" id="password" name="password" class="form-input"
                            placeholder="Enter your password" required>
                    </div>

                    <div class="form-group">
                        <label for="captcha" class="form-label">Captcha</label>
                        <div class="captcha-container">
                            <input type="text" id="captcha" name="captcha" class="form-input captcha-input"
                                placeholder="Enter the code" required>
                            <div class="captcha-display" id="captchaDisplay"></div>
                            <button type="button" class="captcha-refresh" id="refreshCaptcha" title="Refresh Captcha">
                                ↻
                            </button>
                        </div>
                        <div class="captcha-error" id="captchaError"></div>
                    </div>

                    <button type="submit" class="login-button">Login</button>
                </form>

                <div class="signup-section">
                    <span class="signup-text">or</span>
                    <p class="signup-prompt">
                        Not connected to us yet?
                        <a href="/employee-login/employee-signup.html" class="signup-link">Sign up</a>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <!-- Forgot Password Modal -->
    <div id="forgotPasswordModal" class="modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; justify-content: center; align-items: center;">
        <div class="modal-content" style="background: var(--bg-card, #1e293b); padding: 2rem; border-radius: 12px; width: 90%; max-width: 400px; color: var(--text-main, #f8fafc);">
            <h2 style="margin-bottom: 1rem; color: #fff;">Reset Password</h2>
            
            <div id="fpStep1">
                <p style="margin-bottom: 1rem; color: #94a3b8; font-size: 0.9rem;">Enter your email ID to receive an OTP.</p>
                <div class="form-group" style="margin-bottom: 1rem; text-align: left;">
                    <label style="display: block; margin-bottom: 0.5rem; color: #cbd5e1; font-size: 0.875rem;">Email ID</label>
                    <input type="email" id="fpEmail" class="form-input" style="width: 100%; box-sizing: border-box;" placeholder="Email ID">
                </div>
                <div style="display: flex; gap: 1rem; justify-content: flex-end;">
                    <button type="button" id="fpCancelBtn" style="padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid #475569; background: transparent; color: #cbd5e1; cursor: pointer;">Cancel</button>
                    <button type="button" id="fpSendOtpBtn" style="padding: 0.5rem 1rem; border-radius: 6px; border: none; background: #3b82f6; color: white; cursor: pointer;">Send OTP</button>
                </div>
            </div>

            <div id="fpStep2" style="display: none;">
                <p style="margin-bottom: 1rem; color: #94a3b8; font-size: 0.9rem;">Enter the OTP sent to your email and your new password.</p>
                <div class="form-group" style="margin-bottom: 1rem; text-align: left;">
                    <label style="display: block; margin-bottom: 0.5rem; color: #cbd5e1; font-size: 0.875rem;">OTP</label>
                    <input type="text" id="fpOtp" class="form-input" style="width: 100%; box-sizing: border-box;" placeholder="Enter 6-digit OTP">
                </div>
                <div class="form-group" style="margin-bottom: 1rem; text-align: left;">
                    <label style="display: block; margin-bottom: 0.5rem; color: #cbd5e1; font-size: 0.875rem;">New Password</label>
                    <input type="password" id="fpNewPassword" class="form-input" style="width: 100%; box-sizing: border-box;" placeholder="New Password">
                </div>
                <div style="display: flex; gap: 1rem; justify-content: flex-end;">
                    <button type="button" id="fpCancelBtn2" style="padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid #475569; background: transparent; color: #cbd5e1; cursor: pointer;">Cancel</button>
                    <button type="button" id="fpResetBtn" style="padding: 0.5rem 1rem; border-radius: 6px; border: none; background: #10b981; color: white; cursor: pointer;">Reset Password</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/HomePage/toast.js"></script>
    <script src="/employee-login/employee-login.js"></script>
</body>

</html>
