<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration - GovVerify</title>
    <link rel="stylesheet" href="/student-login/student-login.css">
    <link rel="stylesheet" href="/HomePage/toast.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <a href="/" style="text-decoration: none; color: inherit;">
                <div class="logo">
                    <i class="fas fa-shield-alt" style="color: #3b82f6; font-size: 24px; margin-right: 8px;"></i>
                    <span class="logo-text">GovVerify</span>
                </div>
            </a>
            <nav class="nav">
                <a href="/HomePage/index.html" class="nav-link">Home</a>
                <a href="#" class="nav-link">About</a>
                <a href="#" class="nav-link">Contact</a>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main">
        <div class="login-container">
            <div class="login-form">
                <h1 class="login-title">Student Sign Up</h1>
                <p class="login-subtitle">Create your account to access certificate verification services.</p>
                
                <form id="signupForm" class="form">
                    <div class="field-container" style="margin-bottom: 1.25rem; text-align: left;">
                        <label style="display: block; margin-bottom: 0.5rem; color: #cbd5e1; font-size: 0.875rem; font-weight: 500; margin-left: 0.25rem;">Full Name</label>
                        <div class="input-group" style="margin-bottom: 0;">
                            <div class="input-icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                    <circle cx="12" cy="7" r="4"></circle>
                                </svg>
                            </div>
                            <input type="text" id="fullName" name="fullName" placeholder="Enter your full name" class="input-field" required>
                        </div>
                    </div>

                    <div class="field-container" style="margin-bottom: 1.25rem; text-align: left;">
                        <label style="display: block; margin-bottom: 0.5rem; color: #cbd5e1; font-size: 0.875rem; font-weight: 500; margin-left: 0.25rem;">Email Address</label>
                        <div class="input-group" style="margin-bottom: 0;">
                            <div class="input-icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                                    <polyline points="22,6 12,13 2,6"></polyline>
                                </svg>
                            </div>
                            <input type="email" id="email" name="email" placeholder="Enter your email address" class="input-field" required>
                        </div>
                    </div>

                    <div class="field-container" style="margin-bottom: 1.25rem; text-align: left;">
                        <label style="display: block; margin-bottom: 0.5rem; color: #cbd5e1; font-size: 0.875rem; font-weight: 500; margin-left: 0.25rem;">Username</label>
                        <div class="input-group" style="margin-bottom: 0;">
                            <div class="input-icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                    <circle cx="12" cy="7" r="4"></circle>
                                </svg>
                            </div>
                            <input type="text" id="username" name="username" placeholder="Choose a username" class="input-field" required>
                        </div>
                    </div>

                    <div class="field-container" style="margin-bottom: 1.25rem; text-align: left;">
                        <label style="display: block; margin-bottom: 0.5rem; color: #cbd5e1; font-size: 0.875rem; font-weight: 500; margin-left: 0.25rem;">Password</label>
                        <div class="input-group" style="margin-bottom: 0;">
                            <div class="input-icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                    <circle cx="12" cy="16" r="1"></circle>
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                                </svg>
                            </div>
                            <input type="password" id="password" name="password" placeholder="Create a strong password" class="input-field" required>
                        </div>
                    </div>

                    <div class="field-container" style="margin-bottom: 1.5rem; text-align: left;">
                        <label style="display: block; margin-bottom: 0.5rem; color: #cbd5e1; font-size: 0.875rem; font-weight: 500; margin-left: 0.25rem;">Confirm Password</label>
                        <div class="input-group" style="margin-bottom: 0;">
                            <div class="input-icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                    <circle cx="12" cy="16" r="1"></circle>
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                                </svg>
                            </div>
                            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" class="input-field" required>
                        </div>
                    </div>

                    <button type="submit" class="login-btn">Sign Up</button>

                    <div class="signup-section">
                        <span class="or-text">or</span>
                        <p class="signup-text">
                            Already have an account? 
                            <a href="/student-login/student-login.html" class="signup-link">Login</a>
                        </p>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="/HomePage/toast.js"></script>
    <script>
        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            // Collect form data
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Basic validation
            if (!fullName || !email || !username || !password || !confirmPassword) {
                showToast('Please fill in all fields.', 'error');
                return;
            }
            if (password !== confirmPassword) {
                showToast('Passwords do not match.', 'error');
                return;
            }
            if (username.length < 3) {
                showToast('Username must be at least 3 characters.', 'error');
                return;
            }
            if (password.length < 6) {
                showToast('Password must be at least 6 characters.', 'error');
                return;
            }

            // Send signup request to backend
            try {
                const response = await fetch('/api/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, role: 'student', email, fullName })
                });
                const data = await response.json();
                if (response.ok) {
                    showToast('Signup successful! Please login.', 'success');
                    setTimeout(() => window.location.href = '/student-login/student-login.html', 1500);
                } else {
                    showToast(data.error || 'Signup failed.', 'error');
                }
            } catch (err) {
                showToast('Network error. Please try again.', 'error');
            }
        });
    </script>
</body>
</html>
